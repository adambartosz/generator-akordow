<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagram akordu</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #fff; color: #000; padding: 1.2rem; }
.wrap { max-width: 420px; }
h1 { font-size: 1.2rem; margin-bottom: 0.9rem; }
.board-wrap { position: relative; display: block; line-height: 0; }
canvas { display: block; cursor: pointer; }
#chord-label {
  position: absolute;
  top: 0;
  left: 0;
  width: 280px;
  height: 56px;
  border: none;
  outline: none;
  background: #fff;
  text-align: center;
  font: bold 28px Arial;
  color: #000;
  line-height: 56px;
  padding: 0;
}
#fret-start {
  position: absolute;
  top: 37px;
  left: 60px;
  width: 30px;
  height: 22px;
  border: none;
  outline: none;
  background: #fff;
  text-align: center;
  font: bold 13px Arial;
  color: #000;
  padding: 0;
  -moz-appearance: textfield;
}
#fret-start::-webkit-outer-spin-button,
#fret-start::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.buttons { margin-top: 0.7rem; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
button { padding: 0.4rem 0.9rem; font-size: 0.9rem; font-family: inherit; border: 1px solid #000; border-radius: 4px; cursor: pointer; background: #fff; }
button.primary { background: #000; color: #fff; }
#copy-status { font-size: 0.82rem; color: #555; display: none; }
#dl { display: none; }
#img-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
#img-modal.show { display: flex; }
#img-modal .box { background: #fff; padding: 1rem; border-radius: 6px; max-width: 90vw; max-height: 90vh; overflow: auto; text-align: center; }
#img-modal img { max-width: 100%; display: block; margin: 0 auto 0.6rem; }
#img-modal p { font-size: 0.85rem; color: #555; margin-bottom: 0.6rem; }
#img-modal button { margin-top: 0.4rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Diagram akordu</h1>
  <div class="board-wrap">
    <canvas id="cv"></canvas>
    <input id="chord-label" type="text" maxlength="24" placeholder="np. Cmaj7">
    <input id="fret-start" type="number" min="1" max="14" value="1">
  </div>
  <div class="buttons">
    <button id="btn-clear">Wyczyść</button>
    <button id="btn-copy">Kopiuj PNG</button>
    <span id="copy-status"></span>
  </div>
  <a id="dl"></a>
</div>
<div id="img-modal">
  <div class="box">
    <p id="img-modal-msg">Kliknij prawym przyciskiem na obrazku &rarr; Kopiuj obraz</p>
    <img id="img-modal-img" alt="Diagram akordu">
    <div class="buttons" style="justify-content:center;">
      <button id="img-modal-download" class="primary">Pobierz PNG</button>
      <button id="img-modal-close">Zamknij</button>
    </div>
  </div>
</div>
<script>
(function(){

var SCALE = 2;
var COLS = 4;
var ROWS = 6;
var ML = 48;
var MR = 16;
var MT = 68;
var MB = 16;
var CS = 54;
var RS = 36;
var GW = COLS * CS;
var GH = (ROWS - 1) * RS;
var CW = ML + GW + MR;
var CH = MT + GH + MB;
var DOT_R = 12;
var BAR_W = 24;

var ROMAN  = ["","I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV"];
var TUNING = [4,11,7,2,9,4];
var NOTES  = ["C","C#","D","D#","E","F","F#","G","G#","A","B","H"];
var SNAMES = ["e","H","G","D","A","E"];

var startFret = 1;
var strings = Array.from({length:6}, function(){ return {col:null, muted:false}; });
var barres = [];
var BAR_END_R = 14;

var cv = document.getElementById("cv");
cv.width  = CW * SCALE;
cv.height = CH * SCALE;
cv.style.width  = CW + "px";
cv.style.height = CH + "px";
var ctx = cv.getContext("2d");
ctx.scale(SCALE, SCALE);

function gx(col, ml) { return (ml === undefined ? ML : ml) + (col - 0.5) * CS; }
function gy(si)  { return MT + si * RS; }

function canvasXY(e) {
  var r = cv.getBoundingClientRect();
  var t = e.touches ? e.touches[0] : (e.changedTouches ? e.changedTouches[0] : e);
  return {
    x: (t.clientX - r.left) * (CW / r.width),
    y: (t.clientY - r.top)  * (CH / r.height)
  };
}

function colFromX(x) { return Math.max(1, Math.min(COLS, Math.round((x - ML) / CS + 0.5))); }
function siFromY(y)  { return Math.max(0, Math.min(ROWS-1, Math.round((y - MT) / RS))); }

function noteName(si, col) {
  return NOTES[(TUNING[si] + startFret + col - 1) % 12];
}

function barreAt(si, col) {
  for (var i = 0; i < barres.length; i++) {
    var b = barres[i];
    if (b.from <= si && si <= b.to && (col === undefined || b.col === col)) return b;
  }
  return null;
}
function inBarre(si) {
  return !!barreAt(si);
}

function removeFromBarre(b, si) {
  var idx = barres.indexOf(b);
  if (idx < 0) return;
  if (b.from === b.to) {
    barres.splice(idx, 1);
  } else if (si === b.from) {
    b.from = si + 1;
  } else if (si === b.to) {
    b.to = si - 1;
  } else {
    barres.push({col: b.col, from: si + 1, to: b.to});
    b.to = si - 1;
  }
}

function normalizeBarres() {
  for (var i = barres.length - 1; i >= 0; i--) {
    var b = barres[i];
    if (b.from > b.to || b.from < 0 || b.to > ROWS - 1) { barres.splice(i,1); continue; }
    for (var s = b.from; s <= b.to; s++) {
      if (strings[s].muted) { barres.splice(i,1); break; }
    }
  }

  var bridged = true;
  while (bridged) {
    bridged = false;
    for (var si = 0; si < ROWS && !bridged; si++) {
      var st = strings[si];
      if (st.muted || st.col === null) continue;
      var endBarre = null, startBarre = null;
      for (var k = 0; k < barres.length; k++) {
        if (barres[k].col === st.col && barres[k].to === si - 1) endBarre = barres[k];
        if (barres[k].col === st.col && barres[k].from === si + 1) startBarre = barres[k];
      }
      if (endBarre && startBarre) {
        endBarre.to = startBarre.to;
        barres.splice(barres.indexOf(startBarre), 1);
        bridged = true;
      }
    }
  }

  var changed = true;
  while (changed) {
    changed = false;
    outer:
    for (var a = 0; a < barres.length; a++) {
      for (var bIdx = a + 1; bIdx < barres.length; bIdx++) {
        var ba = barres[a], bb = barres[bIdx];
        if (ba.col !== bb.col) continue;
        if (ba.to + 1 < bb.from || bb.to + 1 < ba.from) continue;
        ba.from = Math.min(ba.from, bb.from);
        ba.to = Math.max(ba.to, bb.to);
        barres.splice(bIdx, 1);
        changed = true;
        break outer;
      }
    }
  }

  for (var i3 = barres.length - 1; i3 >= 0; i3--) {
    var b3 = barres[i3];
    if (b3.from === b3.to) {
      if (strings[b3.from].col === null) strings[b3.from].col = b3.col;
      barres.splice(i3, 1);
    }
  }

  for (var i2 = barres.length - 1; i2 >= 0; i2--) {
    var b2 = barres[i2];
    var allDotted = true;
    for (var s2 = b2.from; s2 <= b2.to; s2++) {
      if (strings[s2].col !== b2.col) { allDotted = false; break; }
    }
    if (allDotted) barres.splice(i2, 1);
  }
}

function draw() {
  normalizeBarres();
  render(ctx, ML, CW);
}

function render(c, ml, w) {
  c.clearRect(0, 0, w, CH);
  c.fillStyle = "#fff";
  c.fillRect(0, 0, w, CH);

  var lbl = document.getElementById("chord-label").value.trim();
  if (lbl) {
    c.fillStyle = "#000";
    c.font = "bold 28px Arial";
    c.textAlign = "center";
    c.textBaseline = "middle";
    c.fillText(lbl, w/2, MT/2 - 4);
  }

  if (startFret > 1) {
    c.fillStyle = "#000";
    c.font = "bold 13px Arial";
    c.textAlign = "center";
    c.textBaseline = "middle";
    c.fillText(ROMAN[startFret], ml + CS / 2, MT - 20);
  }

  c.strokeStyle = "#000";
  c.lineWidth = startFret === 1 ? 5 : 1.5;
  c.beginPath(); c.moveTo(ml, MT); c.lineTo(ml, MT + GH); c.stroke();

  c.lineWidth = 1.5;
  for (var f = 1; f <= COLS; f++) {
    var x = ml + f * CS;
    c.beginPath(); c.moveTo(x, MT); c.lineTo(x, MT+GH); c.stroke();
  }

  for (var s = 0; s < ROWS; s++) {
    var y = gy(s);
    c.beginPath(); c.moveTo(ml, y); c.lineTo(ml+GW, y); c.stroke();
  }

  for (var bidx = 0; bidx < barres.length; bidx++) {
    var b = barres[bidx];
    var bx = gx(b.col, ml);

    if (b.from !== b.to) {
      c.save();
      c.strokeStyle = "#000";
      c.lineWidth = BAR_W;
      c.lineCap = "round";
      c.beginPath();
      c.moveTo(bx, gy(b.from));
      c.lineTo(bx, gy(b.to));
      c.stroke();
      c.restore();

      c.fillStyle = "#000";
      c.beginPath(); c.arc(bx, gy(b.from), BAR_END_R, 0, 2*Math.PI); c.fill();
      c.beginPath(); c.arc(bx, gy(b.to), BAR_END_R, 0, 2*Math.PI); c.fill();
    }

    for (var bi = b.from; bi <= b.to; bi++) {
      if (strings[bi].col !== null) continue;
      c.fillStyle = "#fff";
      c.font = "bold 10px Arial";
      c.textAlign = "center";
      c.textBaseline = "middle";
      c.fillText(noteName(bi, b.col), bx, gy(bi));
    }
  }

  for (var si = 0; si < ROWS; si++) {
    var st = strings[si];
    var yp = gy(si);
    var lx = ml - 22;

    c.textAlign = "center";
    c.textBaseline = "middle";

    if (st.muted) {
      c.fillStyle = "#000";
      c.font = "bold 17px Arial";
      c.fillText("\u00D7", lx, yp);
    } else if (!inBarre(si) && st.col === null) {
      c.fillStyle = "#888";
      c.font = "12px Arial";
      c.fillText(SNAMES[si], lx, yp);
    }

    if (!st.muted && st.col !== null) {
      var dx = gx(st.col, ml);
      c.beginPath();
      c.arc(dx, yp, DOT_R, 0, 2*Math.PI);
      c.fillStyle = "#000";
      c.fill();
      c.fillStyle = "#fff";
      c.font = "bold 10px Arial";
      c.textAlign = "center";
      c.textBaseline = "middle";
      c.fillText(noteName(si, st.col), dx, yp);
    }
  }
}

var drag = null;

cv.addEventListener("mousedown", onDown);
cv.addEventListener("touchstart", onDown, {passive:false});

function onDown(e) {
  e.preventDefault();
  var pt = canvasXY(e);

  if (pt.x < ML - 4) {
    if (pt.y < MT - 10 || pt.y > MT + GH + 10) return;
    var si = siFromY(pt.y);
    strings[si].muted = !strings[si].muted;
    if (strings[si].muted) {
      strings[si].col = null;
      for (var bk = barres.length - 1; bk >= 0; bk--) {
        var bb = barres[bk];
        if (si >= bb.from && si <= bb.to) removeFromBarre(bb, si);
      }
    }
    draw();
    return;
  }

  if (pt.x > ML + GW + 8 || pt.y < MT - 10 || pt.y > MT + GH + 10) return;

  var col = colFromX(pt.x);
  var si0 = siFromY(pt.y);

  var grabBarre = null, grabEnd = null;
  for (var gi = 0; gi < barres.length; gi++) {
    var gb = barres[gi];
    if (gb.col !== col) continue;
    if (si0 === gb.from) { grabBarre = gb; grabEnd = "from"; break; }
    if (si0 === gb.to)   { grabBarre = gb; grabEnd = "to"; break; }
  }

  drag = {col:col, si0:si0, siNow:si0, origin:pt, moved:false, barre:grabBarre, end:grabEnd};

  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
  window.addEventListener("touchmove", onMove, {passive:false});
  window.addEventListener("touchend", onUp);
}

function onMove(e) {
  if (!drag) return;
  e.preventDefault();
  var pt = canvasXY(e);
  if (Math.abs(pt.y - drag.origin.y) > 8) drag.moved = true;
  drag.siNow = siFromY(pt.y);
  drawPreview();
}

function drawPreview() {
  draw();
  if (!drag || !drag.moved) return;
  var bx = gx(drag.col);

  if (drag.barre) {
    var fromSi, toSi;
    if (drag.end === "from") {
      fromSi = Math.min(drag.siNow, drag.barre.to);
      toSi   = drag.barre.to;
    } else {
      fromSi = drag.barre.from;
      toSi   = Math.max(drag.siNow, drag.barre.from);
    }
    ctx.save();
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.lineWidth = BAR_W;
    ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(bx, gy(fromSi)); ctx.lineTo(bx, gy(toSi)); ctx.stroke();
    ctx.restore();
    return;
  }

  var fromSi = Math.min(drag.si0, drag.siNow);
  var toSi   = Math.max(drag.si0, drag.siNow);
  if (fromSi === toSi) return;
  ctx.save();
  ctx.strokeStyle = "rgba(0,0,0,0.25)";
  ctx.lineWidth = BAR_W;
  ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(bx, gy(fromSi)); ctx.lineTo(bx, gy(toSi)); ctx.stroke();
  ctx.restore();
}

function onUp(e) {
  window.removeEventListener("mousemove", onMove);
  window.removeEventListener("mouseup", onUp);
  window.removeEventListener("touchmove", onMove);
  window.removeEventListener("touchend", onUp);
  if (!drag) return;

  var col = drag.col, si0 = drag.si0, siNow = drag.siNow;
  var moved = drag.moved;
  var grabBarre = drag.barre, grabEnd = drag.end;
  drag = null;

  if (grabBarre && moved) {
    var fixed = (grabEnd === "from") ? grabBarre.to : grabBarre.from;
    grabBarre.from = Math.min(fixed, siNow);
    grabBarre.to   = Math.max(fixed, siNow);
    for (var mi = grabBarre.from; mi <= grabBarre.to; mi++) strings[mi].muted = false;
  } else if (moved && si0 !== siNow) {
    var fromSi = Math.min(si0, siNow);
    var toSi   = Math.max(si0, siNow);
    var existingIdx = -1;
    for (var bi2 = 0; bi2 < barres.length; bi2++) {
      var bb2 = barres[bi2];
      if (bb2.col === col && bb2.from === fromSi && bb2.to === toSi) { existingIdx = bi2; break; }
    }
    if (existingIdx >= 0) {
      barres.splice(existingIdx, 1);
    } else {
      barres.push({col:col, from:fromSi, to:toSi});
      for (var i = fromSi; i <= toSi; i++) strings[i].muted = false;
    }
  } else {
    if (strings[si0].col === col) {
      strings[si0].col = null;
    } else {
      var hitBarre = barreAt(si0, col);
      if (hitBarre) {
        removeFromBarre(hitBarre, si0);
      } else {
        strings[si0].col = col;
        strings[si0].muted = false;
      }
    }
  }

  draw();
}

document.getElementById("chord-label").addEventListener("input", function() {
  var inp = this, pos = inp.selectionStart, v = inp.value;
  var fixed = v.length ? v[0] + v.slice(1).replace(/b/g,"\u266D") : v;
  if (fixed !== v) { inp.value = fixed; inp.setSelectionRange(pos,pos); }
  draw();
});

document.getElementById("fret-start").addEventListener("input", function() {
  var v = parseInt(this.value, 10);
  if (!isNaN(v) && v >= 1 && v <= 14) { startFret = v; draw(); }
});

document.getElementById("btn-clear").addEventListener("click", function() {
  strings = Array.from({length:6}, function(){ return {col:null, muted:false}; });
  barres = [];
  startFret = 1;
  document.getElementById("fret-start").value = "1";
  document.getElementById("chord-label").value = "";
  draw();
});

document.getElementById("btn-copy").addEventListener("click", function() {
  var statusEl = document.getElementById("copy-status");

  function showStatus(msg, ok) {
    statusEl.textContent = msg;
    statusEl.style.color = ok ? "#555" : "#c00";
    statusEl.style.display = "inline";
    setTimeout(function(){ statusEl.style.display = "none"; }, 4000);
  }

  var dataUrl = cv.toDataURL("image/png");

  function showModal(msg) {
    document.getElementById("img-modal-img").src = dataUrl;
    document.getElementById("img-modal-msg").textContent = msg;
    document.getElementById("img-modal").classList.add("show");
  }

  cv.toBlob(function(blob) {
    if (blob && navigator.clipboard && window.ClipboardItem) {
      try {
        navigator.clipboard.write([new ClipboardItem({"image/png": blob})])
          .then(function() {
            showStatus("✓ Skopiowano do schowka", true);
          })
          .catch(function() {
            showStatus("Nie udało się skopiować automatycznie", false);
            showModal("Automatyczne kopiowanie nie zadziałało. Kliknij prawym przyciskiem na obrazku i wybierz \"Kopiuj obraz\", albo pobierz plik.");
          });
        return;
      } catch (err) {
        showStatus("Nie udało się skopiować automatycznie", false);
        showModal("Automatyczne kopiowanie nie zadziałało. Kliknij prawym przyciskiem na obrazku i wybierz \"Kopiuj obraz\", albo pobierz plik.");
        return;
      }
    }
    showStatus("Schowek niedostępny w tej przeglądarce", false);
    showModal("Kopiowanie do schowka jest niedostępne. Kliknij prawym przyciskiem na obrazku i wybierz \"Kopiuj obraz\", albo pobierz plik.");
  }, "image/png");
});

document.getElementById("img-modal-download").addEventListener("click", function() {
  var a = document.getElementById("dl");
  a.href = document.getElementById("img-modal-img").src;
  var name = document.getElementById("chord-label").value.trim().replace(/[^a-zA-Z0-9#\u266D]/g,"_") || "akord";
  a.download = name + ".png";
  a.click();
});

document.getElementById("img-modal-close").addEventListener("click", function() {
  document.getElementById("img-modal").classList.remove("show");
});
document.getElementById("img-modal").addEventListener("click", function(e) {
  if (e.target === this) this.classList.remove("show");
});

draw();
})();
</script>
</body>
</html>
