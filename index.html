
<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagram akordu</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, Arial, sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            flex-direction: column;
            padding: 2rem 1rem;
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.10);
            padding: 1rem;
            width: 312px;
            position: relative;
        }

        .chord-sheet-card {
            padding-bottom: 1rem;
        }

        .table-card {
            width: auto;
            padding-bottom: 20px;
        }

        .board-wrap {
            position: relative;
            line-height: 0;
            margin-bottom: 1rem;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        #chord-label {
            position: absolute;
            top: 0;
            left: 0;
            width: 280px;
            height: 64px;
            border: none;
            outline: none;
            background: transparent;
            text-align: center;
            font: bold 48px system-ui, Arial;
            color: #111;
            line-height: 64px;
            padding: 0;
        }

        #fret-start {
            position: absolute;
            top: 55px;
            left: 60px;
            width: 30px;
            height: 22px;
            border: none;
            outline: none;
            background: transparent;
            text-align: center;
            font: bold 13px system-ui, Arial;
            color: #111;
            padding: 0;
            -moz-appearance: textfield;
            appearance: initial;
        }

        #fret-start::-webkit-outer-spin-button,
        #fret-start::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 0.5rem;
            align-items: center;
        }

        #size-input {
            width: 100%;
            padding: 0.38rem 0.3rem;
            font-size: 0.92rem;
            font-family: inherit;
            border: 1px solid #e0e0e0;
            border-radius: 7px;
            background: #fafafa;
            color: #111;
            outline: none;
            appearance: none;
            text-align: center;
        }

        #size-input:focus {
            border-color: #bbb;
            background: #fff;
        }

        .btn {
            padding: 0;
            height: 2.1rem;
            line-height: 2.1rem;
            font-size: 1rem;
            font-family: inherit;
            border-radius: 7px;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            background: #fafafa;
            color: #444;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background: #f0f0f0;
        }

        .btn-primary {
            background: #111;
            color: #fff;
            border-color: #111;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #333;
            border-color: #333;
        }

        #btn-clear,
        #btn-clear-all,
        #btn-copy,
        #add-current-chord,
        #copy-sheet,
        #download-sheet,
        #clear-sheet {
            font-size: 150%;
        }

        #dl {
            display: none;
        }

        .sheet-slider-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .sheet-slider-row label {
            flex: 1;
        }

        .sheet-slider-row input[type=range] {
            width: 100%;
        }

        #sheet-dropzone {
            border: 2px dashed #d0d0d0;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            text-align: center;
            color: #777;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        #sheet-grid {
            display: grid;
            grid-template-columns: repeat(var(--sheet-cols, 4), auto);
            gap: 10px;
            position: relative;
            min-height: 40px;
            justify-content: start;
        }

        .sheet-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid transparent;
            background: #fafafa;
            cursor: grab;
            flex-shrink: 0;
            user-select: none;
            touch-action: none;
            width: 160px;
            height: 160px;
            display: block;
        }

        .sheet-item:active {
            cursor: grabbing;
        }

        .sheet-item.selected {
            border-color: #111;
        }

        .sheet-item.is-dragging {
            opacity: 0.3;
        }

        .sheet-item img {
            display: block;
        }

        .sheet-delete {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            border: none;
            border-radius: 50%;
            background: #111;
            color: #fff;
            cursor: pointer;
            display: none;
            font-size: 18px;
            line-height: 26px;
            text-align: center;
        }

        .sheet-item:hover .sheet-delete {
            display: block;
        }

        .sheet-edit {
            position: absolute;
            top: 6px;
            right: 36px;
            width: 26px;
            height: 26px;
            border: none;
            border-radius: 50%;
            background: #444;
            color: #fff;
            cursor: pointer;
            display: none;
            font-size: 13px;
            line-height: 26px;
            text-align: center;
        }

        .sheet-item:hover .sheet-edit {
            display: block;
        }

        .sheet-item.editing {
            border-color: #f59e0b;
            box-shadow: 0 0 0 2px #f59e0b44;
        }

        #add-current-chord.update-mode {
            background: #f59e0b;
            border-color: #f59e0b;
            color: #fff;
        }

        #drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 36px rgba(0, 0, 0, 0.30);
            transform: scale(1.05);
            display: none;
            top: 0;
            left: 0;
        }

        #drag-ghost img {
            display: block;
        }

        #drop-indicator {
            position: absolute;
            width: 3px;
            background: #111;
            border-radius: 2px;
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        #img-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        #img-modal.show {
            display: flex;
        }

        #img-modal .box {
            background: #fff;
            border-radius: 12px;
            padding: 1.2rem;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.18);
        }

        #img-modal img {
            max-width: 100%;
            display: block;
            margin: 0 auto 0.8rem;
            border-radius: 4px;
        }

        #img-modal p {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.8rem;
        }

        .modal-btns {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        #size-info {
            font-size: 0.8rem;
            color: #888;
            display: block;
            margin-top: 0.6rem;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="board-wrap">
            <canvas id="cv"></canvas>
            <input id="chord-label" type="text" maxlength="24" placeholder="np. a" autocomplete="off">
            <input id="fret-start" type="number" min="1" max="14" value="1">
        </div>
        <div class="controls">
            <select id="size-input">
                <option value="160" selected>160 px</option>
                <option value="280">280 px</option>
                <option value="560">560 px</option>
                <option value="1120">1120 px</option>
            </select>
            <button class="btn" id="btn-clear" title="Usuń nuty i poprzeczki">♪ ✕</button>
            <button class="btn" id="btn-clear-all" title="Usuń wszystko">🗑</button>
            <button class="btn btn-primary" id="btn-copy" title="Kopiuj do schowka">⧉</button>
        </div>
    </div>

    <div class="card chord-sheet-card">

        <div class="sheet-slider-row">
            <label>
                Kolumny
                <input id="sheet-cols" type="range" min="1" max="12" value="4">
            </label>
            <span id="sheet-cols-label">4 kolumny</span>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="add-current-chord" title="Dodaj do tabelki">+</button>
            <button class="btn" id="copy-sheet" title="Kopiuj tabelkę">⧉</button>
            <button class="btn" id="download-sheet" title="Pobierz tabelkę">⬇</button>
            <button class="btn" id="clear-sheet" title="Usuń wszystkie elementy">🗑</button>
        </div>
        <span id="size-info"></span>
    </div>

    <div class="card table-card">

        <div id="sheet-dropzone">Lub Ctrl+V aby wkleić obraz</div>

        <div id="sheet-grid">
            <div id="drop-indicator"></div>
        </div>

        <div id="drag-ghost"><img id="drag-ghost-img" alt=""></div>
    </div>

    <div id="img-modal">
        <div class="box">
            <p id="img-modal-msg"></p>
            <img id="img-modal-img" alt="Diagram akordu">
            <div class="modal-btns">
                <button class="btn btn-primary" id="img-modal-download">Pobierz PNG</button>
                <button class="btn" id="img-modal-close">Zamknij</button>
            </div>
        </div>
    </div>
    <a id="dl"></a>

    <script>
        (function () {
            var COLS = 4, ROWS = 6;
            var ML = 48, MR = 16, MT = 90, MB = 20, CS = 54, RS = 36;
            var GW = COLS * CS, GH = (ROWS - 1) * RS;
            var CW = ML + GW + MR, CH = MT + GH + MB;
            var DOT_R = 12, BAR_W = 24, BAR_END_R = 14, SCALE = 2;

            var ROMAN = ["", "I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII", "XIII", "XIV", "XV"];
            var TUNING = [4, 11, 7, 2, 9, 4];
            var NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "B", "H"];
            var SNAMES = ["e", "H", "G", "D", "A", "E"];

            var startFret = 1;
            var strings = Array.from({ length: 6 }, () => ({ col: null, muted: false }));
            var barres = [];
            var isExport = false;

            var cv = document.getElementById("cv");
            cv.width = CW * SCALE;
            cv.height = CH * SCALE;
            cv.style.width = CW + "px";
            cv.style.height = CH + "px";
            var ctx = cv.getContext("2d");
            ctx.scale(SCALE, SCALE);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";

            function getExportSize() {
                return parseInt(document.getElementById("size-input").value, 10) || 160;
            }

            function updateSizeInfo() {
                var items = sheetGrid.querySelectorAll(".sheet-item").length;
                var cols = parseInt(sheetCols.value, 10) || 4;
                var effCols = items ? Math.min(cols, items) : cols;
                var rows = items ? Math.ceil(items / cols) : 0;
                var gap = 10, s = 160;
                var w = effCols * s + (effCols - 1) * gap;
                var h = rows * s + (rows - 1) * gap;
                document.getElementById("size-info").textContent = items ? w + " × " + h + " px" : "";
                document.querySelector(".table-card").style.setProperty("--eff-cols", effCols);
            }

            function renderSquare(targetCtx, size) {
                targetCtx.fillStyle = "#fff";
                targetCtx.fillRect(0, 0, size, size);

                var aspect = CW / CH;
                var drawW, drawH, offX, offY;
                if (aspect >= 1) {
                    drawW = size;
                    drawH = size / aspect;
                    offX = 0;
                    offY = (size - drawH) / 2;
                } else {
                    drawH = size;
                    drawW = size * aspect;
                    offX = (size - drawW) / 2;
                    offY = 0;
                }

                targetCtx.save();
                targetCtx.translate(offX, offY);
                targetCtx.scale(drawW / CW, drawH / CH);
                render(targetCtx, ML, CW, true);
                targetCtx.restore();
            }

            function exportSquareDataURL(size) {
                var t = document.createElement("canvas");
                t.width = size; t.height = size;
                var tc = t.getContext("2d");
                tc.imageSmoothingEnabled = true;
                tc.imageSmoothingQuality = "high";
                renderSquare(tc, size);
                return t.toDataURL("image/png");
            }

            function exportSquareBlob(size, cb) {
                var t = document.createElement("canvas");
                t.width = size; t.height = size;
                var tc = t.getContext("2d");
                tc.imageSmoothingEnabled = true;
                tc.imageSmoothingQuality = "high";
                renderSquare(tc, size);
                t.toBlob(cb, "image/png");
            }

            function gx(col, ml) { return (ml === undefined ? ML : ml) + (col - 0.5) * CS; }
            function gy(si) { return MT + si * RS; }

            function canvasXY(e) {
                var r = cv.getBoundingClientRect();
                var t = e.touches ? e.touches[0] : (e.changedTouches ? e.changedTouches[0] : e);
                return { x: (t.clientX - r.left) * (CW / r.width), y: (t.clientY - r.top) * (CH / r.height) };
            }
            function colFromX(x) { return Math.max(1, Math.min(COLS, Math.round((x - ML) / CS + 0.5))); }
            function siFromY(y) { return Math.max(0, Math.min(ROWS - 1, Math.round((y - MT) / RS))); }

            function noteName(si, col) { return NOTES[(TUNING[si] + startFret + col - 1) % 12]; }

            function barreAt(si, col) {
                for (var i = 0; i < barres.length; i++) {
                    var b = barres[i];
                    if (b.from <= si && si <= b.to && (col === undefined || b.col === col)) return b;
                }
                return null;
            }
            function inBarre(si) { return !!barreAt(si); }

            function removeFromBarre(b, si) {
                var idx = barres.indexOf(b); if (idx < 0) return;
                if (b.from === b.to) { barres.splice(idx, 1); }
                else if (si === b.from) { b.from = si + 1; }
                else if (si === b.to) { b.to = si - 1; }
                else { barres.push({ col: b.col, from: si + 1, to: b.to }); b.to = si - 1; }
            }

            function normalizeBarres() {
                for (var i = barres.length - 1; i >= 0; i--) {
                    var b = barres[i];
                    if (b.from > b.to || b.from < 0 || b.to > ROWS - 1) { barres.splice(i, 1); continue; }
                    for (var s = b.from; s <= b.to; s++) { if (strings[s].muted) { barres.splice(i, 1); break; } }
                }
                var absorbed = true;
                while (absorbed) {
                    absorbed = false;
                    for (var si2 = 0; si2 < ROWS && !absorbed; si2++) {
                        var st2 = strings[si2]; if (st2.muted || st2.col === null) continue;
                        for (var k2 = 0; k2 < barres.length; k2++) {
                            var bk = barres[k2]; if (bk.col !== st2.col) continue;
                            if (bk.to === si2 - 1) { bk.to = si2; strings[si2].col = null; absorbed = true; break; }
                            if (bk.from === si2 + 1) { bk.from = si2; strings[si2].col = null; absorbed = true; break; }
                        }
                    }
                }
                var bridged = true;
                while (bridged) {
                    bridged = false;
                    for (var si = 0; si < ROWS && !bridged; si++) {
                        var st = strings[si]; if (st.muted || st.col === null) continue;
                        var eB = null, sB = null;
                        for (var k = 0; k < barres.length; k++) {
                            if (barres[k].col === st.col && barres[k].to === si - 1) eB = barres[k];
                            if (barres[k].col === st.col && barres[k].from === si + 1) sB = barres[k];
                        }
                        if (eB && sB) { eB.to = sB.to; barres.splice(barres.indexOf(sB), 1); bridged = true; }
                    }
                }
                var changed = true;
                while (changed) {
                    changed = false;
                    outer: for (var a = 0; a < barres.length; a++) {
                        for (var bI = a + 1; bI < barres.length; bI++) {
                            var ba = barres[a], bb = barres[bI]; if (ba.col !== bb.col) continue;
                            if (ba.to + 1 < bb.from || bb.to + 1 < ba.from) continue;
                            ba.from = Math.min(ba.from, bb.from); ba.to = Math.max(ba.to, bb.to);
                            barres.splice(bI, 1); changed = true; break outer;
                        }
                    }
                }
                for (var i3 = barres.length - 1; i3 >= 0; i3--) {
                    var b3 = barres[i3];
                    if (b3.from === b3.to) { if (strings[b3.from].col === null) strings[b3.from].col = b3.col; barres.splice(i3, 1); }
                }
                for (var i2 = barres.length - 1; i2 >= 0; i2--) {
                    var b2 = barres[i2], aD = true;
                    for (var s2 = b2.from; s2 <= b2.to; s2++) { if (strings[s2].col !== b2.col) { aD = false; break; } }
                    if (aD) barres.splice(i2, 1);
                }
            }

            function draw() { normalizeBarres(); render(ctx, ML, CW, false); }

            function render(c, ml, w, exportMode) {
                c.clearRect(0, 0, w, CH);
                c.fillStyle = "#fff"; c.fillRect(0, 0, w, CH);
                if (exportMode) {
                    var lbl = document.getElementById("chord-label").value.trim();
                    if (lbl) {
                        c.fillStyle = "#111"; c.font = "bold 36px system-ui,Arial";
                        c.textAlign = "center"; c.textBaseline = "middle";
                        c.fillText(lbl, w / 2, MT / 2);
                    }
                    if (startFret > 1) {
                        c.fillStyle = "#111"; c.font = "bold 13px system-ui,Arial";
                        c.textAlign = "center"; c.textBaseline = "middle";
                        var fretX = ml + CS / 2, fretY = MT - 10;
                        if (strings[0].col === 1) fretY = MT - 20;
                        for (var i = 0; i < barres.length; i++) {
                            var b = barres[i]; if (b.col === 1 && b.from === 0) { fretY = MT - 25; break; }
                        }
                        c.fillText(ROMAN[startFret], fretX, fretY);
                    }
                }
                c.strokeStyle = "#111";
                c.lineWidth = startFret === 1 ? 5 : 1.5;
                c.beginPath(); c.moveTo(ml, MT); c.lineTo(ml, MT + GH); c.stroke();
                c.lineWidth = 1.5;
                for (var f = 1; f <= COLS; f++) {
                    var x = ml + f * CS; c.beginPath(); c.moveTo(x, MT); c.lineTo(x, MT + GH); c.stroke();
                }
                for (var s = 0; s < ROWS; s++) {
                    var y = gy(s); c.lineWidth = 1.5; c.beginPath(); c.moveTo(ml, y); c.lineTo(ml + GW, y); c.stroke();
                }
                for (var bidx = 0; bidx < barres.length; bidx++) {
                    var b = barres[bidx], bx = gx(b.col, ml);
                    if (b.from !== b.to) {
                        c.save(); c.strokeStyle = "#111"; c.lineWidth = BAR_W; c.lineCap = "round";
                        c.beginPath(); c.moveTo(bx, gy(b.from)); c.lineTo(bx, gy(b.to)); c.stroke(); c.restore();
                        c.fillStyle = "#111";
                        c.beginPath(); c.arc(bx, gy(b.from), BAR_END_R, 0, 2 * Math.PI); c.fill();
                        c.beginPath(); c.arc(bx, gy(b.to), BAR_END_R, 0, 2 * Math.PI); c.fill();
                    }
                    for (var bi = b.from; bi <= b.to; bi++) {
                        if (strings[bi].col !== null) continue;
                        c.fillStyle = "#fff"; c.font = "bold 10px system-ui,Arial";
                        c.textAlign = "center"; c.textBaseline = "middle";
                        c.fillText(noteName(bi, b.col), bx, gy(bi));
                    }
                }
                for (var si = 0; si < ROWS; si++) {
                    var st = strings[si], yp = gy(si), lx = ml - 22;
                    c.textAlign = "center"; c.textBaseline = "middle";
                    if (st.muted) {
                        c.fillStyle = "#111"; c.font = "bold 17px system-ui,Arial";
                        c.fillText("×", lx, yp);
                    } else if (!inBarre(si) && st.col === null) {
                        c.fillStyle = "#555"; c.font = "12px system-ui,Arial";
                        c.fillText(SNAMES[si], lx, yp);
                    }
                    if (!st.muted && st.col !== null) {
                        var dx = gx(st.col, ml);
                        c.beginPath(); c.arc(dx, yp, DOT_R, 0, 2 * Math.PI);
                        c.fillStyle = "#111"; c.fill();
                        c.fillStyle = "#fff"; c.font = "bold 10px system-ui,Arial";
                        c.textAlign = "center"; c.textBaseline = "middle";
                        c.fillText(noteName(si, st.col), dx, yp);
                    }
                }
            }

            function setOverlayVisible(v) {
                document.getElementById("chord-label").style.display = v ? "block" : "none";
                document.getElementById("fret-start").style.display = v ? "block" : "none";
            }

            var drag = null;
            cv.addEventListener("mousedown", onDown);
            cv.addEventListener("touchstart", onDown, { passive: false });

            function onDown(e) {
                e.preventDefault();
                var pt = canvasXY(e);
                if (pt.x < ML - 4) {
                    if (pt.y < MT - 10 || pt.y > MT + GH + 10) return;
                    var si = siFromY(pt.y);
                    strings[si].muted = !strings[si].muted;
                    if (strings[si].muted) {
                        strings[si].col = null;
                        for (var bk = barres.length - 1; bk >= 0; bk--) {
                            var bb = barres[bk];
                            if (si >= bb.from && si <= bb.to) removeFromBarre(bb, si);
                        }
                    }
                    draw(); return;
                }
                if (pt.x > ML + GW + 8 || pt.y < MT - 10 || pt.y > MT + GH + 10) return;
                var col = colFromX(pt.x), si0 = siFromY(pt.y);
                var gB = null, gE = null;
                for (var gi = 0; gi < barres.length; gi++) {
                    var gb = barres[gi]; if (gb.col !== col) continue;
                    if (si0 === gb.from) { gB = gb; gE = "from"; break; }
                    if (si0 === gb.to) { gB = gb; gE = "to"; break; }
                }
                drag = { col: col, si0: si0, siNow: si0, origin: pt, moved: false, barre: gB, end: gE };
                window.addEventListener("mousemove", onMove);
                window.addEventListener("mouseup", onUp);
                window.addEventListener("touchmove", onMove, { passive: false });
                window.addEventListener("touchend", onUp);
            }

            function onMove(e) {
                if (!drag) return; e.preventDefault();
                var pt = canvasXY(e);
                if (Math.abs(pt.y - drag.origin.y) > 8) drag.moved = true;
                drag.siNow = siFromY(pt.y);
                draw();
                if (!drag.moved) return;
                var bx = gx(drag.col);
                if (drag.barre) {
                    var fS, tS;
                    if (drag.end === "from") { fS = Math.min(drag.siNow, drag.barre.to); tS = drag.barre.to; }
                    else { fS = drag.barre.from; tS = Math.max(drag.siNow, drag.barre.from); }
                    ctx.save(); ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = BAR_W; ctx.lineCap = "round";
                    ctx.beginPath(); ctx.moveTo(bx, gy(fS)); ctx.lineTo(bx, gy(tS)); ctx.stroke(); ctx.restore();
                    return;
                }
                var fS = Math.min(drag.si0, drag.siNow), tS = Math.max(drag.si0, drag.siNow);
                if (fS === tS) return;
                ctx.save(); ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = BAR_W; ctx.lineCap = "round";
                ctx.beginPath(); ctx.moveTo(bx, gy(fS)); ctx.lineTo(bx, gy(tS)); ctx.stroke(); ctx.restore();
            }

            function onUp(e) {
                window.removeEventListener("mousemove", onMove);
                window.removeEventListener("mouseup", onUp);
                window.removeEventListener("touchmove", onMove);
                window.removeEventListener("touchend", onUp);
                if (!drag) return;
                var col = drag.col, si0 = drag.si0, siNow = drag.siNow, moved = drag.moved, gB = drag.barre, gE = drag.end;
                drag = null;
                if (gB && moved && si0 !== siNow) {
                    var fixed = (gE === "from") ? gB.to : gB.from;
                    gB.from = Math.min(fixed, siNow); gB.to = Math.max(fixed, siNow);
                    for (var mi = gB.from; mi <= gB.to; mi++)strings[mi].muted = false;
                } else if (moved && si0 !== siNow) {
                    var fS = Math.min(si0, siNow), tS = Math.max(si0, siNow), eI = -1;
                    for (var bi2 = 0; bi2 < barres.length; bi2++) {
                        var bb2 = barres[bi2];
                        if (bb2.col === col && bb2.from === fS && bb2.to === tS) { eI = bi2; break; }
                    }
                    if (eI >= 0) { barres.splice(eI, 1); }
                    else { barres.push({ col: col, from: fS, to: tS }); for (var i = fS; i <= tS; i++)strings[i].muted = false; }
                } else {
                    if (strings[si0].col === col) {
                        strings[si0].col = null;
                    } else {
                        var hB = barreAt(si0, col);
                        if (hB) { removeFromBarre(hB, si0); }
                        else {
                            var adjB = null;
                            for (var ai = 0; ai < barres.length; ai++) {
                                var ab = barres[ai];
                                if (ab.col === col && (ab.to === si0 - 1 || ab.from === si0 + 1)) { adjB = ab; break; }
                            }
                            if (adjB) {
                                if (adjB.to === si0 - 1) adjB.to = si0; else adjB.from = si0;
                                strings[si0].muted = false;
                            } else { strings[si0].col = col; strings[si0].muted = false; }
                        }
                    }
                }
                draw();
            }

            document.getElementById("chord-label").addEventListener("input", function () {
                var inp = this, pos = inp.selectionStart, v = inp.value;
                var fixed = v.length ? v[0] + v.slice(1).replace(/b/g, "\u266D") : v;
                if (fixed !== v) { inp.value = fixed; inp.setSelectionRange(pos, pos); }
                draw();
            });
            document.getElementById("fret-start").addEventListener("input", function () {
                var v = parseInt(this.value, 10);
                if (!isNaN(v) && v >= 1 && v <= 14) { startFret = v; draw(); }
            });
            document.getElementById("fret-start").addEventListener("click", () => document.getElementById("fret-start").select());
            document.getElementById("btn-clear").addEventListener("click", function () {
                strings = Array.from({ length: 6 }, () => ({ col: null, muted: false }));
                barres = []; draw();
            });
            document.getElementById("btn-clear-all").addEventListener("click", function () {
                strings = Array.from({ length: 6 }, () => ({ col: null, muted: false }));
                barres = []; startFret = 1;
                document.getElementById("fret-start").value = "1";
                document.getElementById("chord-label").value = "";
                draw();
            });
            document.getElementById("btn-copy").addEventListener("click", function () {
                var s = getExportSize();
                setOverlayVisible(false); isExport = true;
                exportSquareBlob(s, function (blob) {
                    isExport = false; setOverlayVisible(true); draw();
                    if (blob && navigator.clipboard && window.ClipboardItem)
                        navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]).catch(() => { });
                });
            });
            document.getElementById("img-modal-download").addEventListener("click", function () {
                var s = getExportSize();
                var a = document.getElementById("dl");
                a.href = exportSquareDataURL(s);
                var name = document.getElementById("chord-label").value.trim().replace(/[^a-zA-Z0-9#]/g, "_") || "akord";
                a.download = name + "_" + s + "px.png";
                a.click();
            });
            document.getElementById("img-modal-close").addEventListener("click", function () {
                document.getElementById("img-modal").classList.remove("show");
            });
            document.getElementById("img-modal").addEventListener("click", function (e) {
                if (e.target === this) this.classList.remove("show");
            });

            var sheetGrid = document.getElementById("sheet-grid");
            var sheetCols = document.getElementById("sheet-cols");
            var sheetColsLabel = document.getElementById("sheet-cols-label");

            sheetCols.addEventListener("input", function () {
                var v = parseInt(this.value, 10);
                sheetColsLabel.textContent = v + " kolumn" + (v === 1 ? "a" : v < 5 ? "y" : "");
                sheetGrid.style.setProperty("--sheet-cols", v);
                updateSizeInfo();
            });
            sheetGrid.style.setProperty("--sheet-cols", parseInt(sheetCols.value, 10));

            function captureState() {
                return {
                    label: document.getElementById("chord-label").value,
                    fretStart: startFret,
                    strings: strings.map(function(s) { return { col: s.col, muted: s.muted }; }),
                    barres: barres.map(function(b) { return { col: b.col, from: b.from, to: b.to }; })
                };
            }

            function applyState(state) {
                document.getElementById("chord-label").value = state.label || "";
                startFret = state.fretStart || 1;
                document.getElementById("fret-start").value = startFret;
                strings = state.strings.map(function(s) { return { col: s.col, muted: s.muted }; });
                barres = state.barres.map(function(b) { return { col: b.col, from: b.from, to: b.to }; });
                draw();
            }

            function setEditingItem(item) {
                document.querySelectorAll(".sheet-item").forEach(function(el) { el.classList.remove("editing"); });
                var btn = document.getElementById("add-current-chord");
                if (item) {
                    item.classList.add("editing");
                    editingSheetItem = item;
                    btn.textContent = "✎";
                    btn.title = "Aktualizuj akord w tabelce";
                    btn.classList.add("update-mode");
                } else {
                    editingSheetItem = null;
                    btn.textContent = "+";
                    btn.title = "Dodaj do tabelki";
                    btn.classList.remove("update-mode");
                }
            }

            function addSheetImage(imgSrc, state) {
                var s = 160;
                var item = document.createElement("div");
                item.className = "sheet-item";
                item.style.width = s + "px";
                item.style.height = s + "px";
                if (state) item._chordState = state;
                var image = document.createElement("img");
                image.src = imgSrc;
                image.style.width = s + "px";
                image.style.height = s + "px";
                var del = document.createElement("button");
                del.className = "sheet-delete";
                del.textContent = "×";
                var editBtn = document.createElement("button");
                editBtn.className = "sheet-edit";
                editBtn.textContent = "✎";
                editBtn.title = "Edytuj akord";
                item.appendChild(image);
                item.appendChild(editBtn);
                item.appendChild(del);
                sheetGrid.appendChild(item);
                updateSizeInfo();
                item.addEventListener("click", function (e) {
                    if (e.target === del || e.target === editBtn) return;
                    document.querySelectorAll(".sheet-item").forEach(el => el.classList.remove("selected"));
                    item.classList.add("selected");
                    selectedSheetItem = item;
                });
                editBtn.addEventListener("click", function (e) {
                    e.stopPropagation();
                    if (editingSheetItem === item) {
                        setEditingItem(null);
                        return;
                    }
                    if (item._chordState) applyState(item._chordState);
                    setEditingItem(item);
                });
                del.addEventListener("click", function (e) {
                    e.stopPropagation();
                    if (editingSheetItem === item) setEditingItem(null);
                    item.remove();
                    if (selectedSheetItem === item) selectedSheetItem = null;
                    updateSizeInfo();
                });
                attachDrag(item);
            }

            document.addEventListener("paste", function (e) {
                for (const item of e.clipboardData.items) {
                    if (!item.type.startsWith("image/")) continue;
                    var file = item.getAsFile();
                    var url = URL.createObjectURL(file);
                    addSheetImage(url, null);
                }
            });

            var ghost = document.getElementById("drag-ghost");
            var ghostImg = document.getElementById("drag-ghost-img");
            var dropInd = document.getElementById("drop-indicator");
            var selectedSheetItem = null;
            var editingSheetItem = null;
            var dragState = null;

            function attachDrag(item) {
                item.addEventListener("pointerdown", onDragStart);
            }

            function onDragStart(e) {
                if (e.target.classList.contains("sheet-delete")) return;
                if (e.target.classList.contains("sheet-edit")) return;
                e.preventDefault();

                var item = e.currentTarget;
                var rect = item.getBoundingClientRect();
                var s = rect.width;

                ghost.style.width = s + "px";
                ghost.style.height = s + "px";
                ghostImg.style.width = s + "px";
                ghostImg.style.height = s + "px";
                ghostImg.src = item.querySelector("img").src;
                positionGhost(e.clientX, e.clientY, s);
                ghost.style.display = "block";

                item.classList.add("is-dragging");

                var ox = e.clientX - rect.left;
                var oy = e.clientY - rect.top;

                dragState = { item, s, ox, oy, moved: false };

                item.setPointerCapture(e.pointerId);
                item.addEventListener("pointermove", onDragMove);
                item.addEventListener("pointerup", onDragEnd);
                item.addEventListener("pointercancel", onDragEnd);
            }

            function positionGhost(cx, cy, s) {
                ghost.style.left = (cx - s / 2) + "px";
                ghost.style.top = (cy - s / 2) + "px";
            }

            function onDragMove(e) {
                if (!dragState) return;
                e.preventDefault();
                dragState.moved = true;
                positionGhost(e.clientX, e.clientY, dragState.s);
                updateDropIndicator(e.clientX, e.clientY);
            }

            function updateDropIndicator(clientX, clientY) {
                var items = [...sheetGrid.querySelectorAll(".sheet-item:not(.is-dragging)")];
                dropInd.style.display = "none";
                if (!items.length) return;

                var gridRect = sheetGrid.getBoundingClientRect();
                var H = dragState ? dragState.s : 160;
                var bestDist = Infinity, bestX, bestY, bestBefore;

                for (var i = 0; i <= items.length; i++) {
                    var r, gx, gy;
                    if (i === 0) {
                        r = items[0].getBoundingClientRect();
                        gx = r.left - gridRect.left - 5;
                        gy = r.top - gridRect.top;
                    } else {
                        r = items[i - 1].getBoundingClientRect();
                        gx = r.right - gridRect.left + 5;
                        gy = r.top - gridRect.top;
                    }
                    var d = Math.hypot((clientX - gridRect.left) - gx, (clientY - gridRect.top) - (gy + H / 2));
                    if (d < bestDist) {
                        bestDist = d; bestX = gx; bestY = gy;
                        bestBefore = i < items.length ? items[i] : null;
                    }
                }

                dropInd.style.display = "block";
                dropInd.style.left = bestX + "px";
                dropInd.style.top = bestY + "px";
                dropInd.style.height = H + "px";
                dropInd._before = bestBefore;
            }

            function onDragEnd(e) {
                if (!dragState) return;
                var item = dragState.item;
                item.removeEventListener("pointermove", onDragMove);
                item.removeEventListener("pointerup", onDragEnd);
                item.removeEventListener("pointercancel", onDragEnd);

                ghost.style.display = "none";
                dropInd.style.display = "none";
                item.classList.remove("is-dragging");

                if (dragState.moved) {
                    var before = dropInd._before;
                    if (before && before !== item) {
                        sheetGrid.insertBefore(item, before);
                    } else if (!before) {
                        sheetGrid.appendChild(item);
                    }
                }

                dragState = null;
            }

            document.addEventListener("keydown", function (e) {
                if (!selectedSheetItem) return;
                if (e.key === "Delete") {
                    if (editingSheetItem === selectedSheetItem) setEditingItem(null);
                    selectedSheetItem.remove(); selectedSheetItem = null; return;
                }
                var prev = selectedSheetItem.previousElementSibling;
                var next = selectedSheetItem.nextElementSibling;
                if (e.key === "ArrowLeft" && prev) sheetGrid.insertBefore(selectedSheetItem, prev);
                if (e.key === "ArrowRight" && next) sheetGrid.insertBefore(next, selectedSheetItem);
            });

            function exportSheetCanvas() {
                var items = [...sheetGrid.querySelectorAll(".sheet-item img")];
                if (!items.length) return null;
                var s = getExportSize();
                var cols = parseInt(sheetCols.value, 10) || 4;
                var rows = Math.ceil(items.length / cols);
                var c = document.createElement("canvas");
                c.width = s * cols; c.height = s * rows;
                var x = c.getContext("2d");
                x.imageSmoothingEnabled = true;
                x.imageSmoothingQuality = "high";
                x.fillStyle = "#fff"; x.fillRect(0, 0, c.width, c.height);
                items.forEach(function (img, i) {
                    var col = i % cols, row = Math.floor(i / cols);
                    x.drawImage(img, col * s, row * s, s, s);
                });
                return c;
            }

            document.getElementById("clear-sheet").addEventListener("click", function () {
                sheetGrid.querySelectorAll(".sheet-item").forEach(el => el.remove());
                selectedSheetItem = null;
                setEditingItem(null);
                updateSizeInfo();
            });

            document.getElementById("add-current-chord").addEventListener("click", function () {
                var state = captureState();
                var src = exportSquareDataURL(1120);
                if (editingSheetItem) {
                    editingSheetItem._chordState = state;
                    editingSheetItem.querySelector("img").src = src;
                    setEditingItem(null);
                } else {
                    addSheetImage(src, state);
                }
            });

            document.getElementById("download-sheet").addEventListener("click", function () {
                var c = exportSheetCanvas(); if (!c) return;
                var a = document.createElement("a");
                a.href = c.toDataURL("image/png"); a.download = "tabelka.png"; a.click();
            });

            document.getElementById("copy-sheet").addEventListener("click", async function () {
                var c = exportSheetCanvas(); if (!c) return;
                var blob = await new Promise(r => c.toBlob(r, "image/png"));
                if (blob && navigator.clipboard && window.ClipboardItem)
                    await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
            });

            draw();
        })();
    </script>
</body>

</html>
